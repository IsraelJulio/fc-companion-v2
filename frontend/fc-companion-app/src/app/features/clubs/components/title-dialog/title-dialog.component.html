<p-toast />

<p-dialog
  [header]="'Adicionar título · ' + (clubName ?? 'Clube')"
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '430px' }"
>
  <div class="flex flex-column gap-3 pt-2">
    <div class="field">
      <label class="block mb-1 font-medium text-sm">Competição *</label>
      <input
        pInputText
        class="w-full"
        [ngModel]="form().competition"
        (ngModelChange)="updateForm('competition', $event)"
        placeholder="Ex.: Premier League" />
    </div>

    <div class="field">
      <label class="block mb-1 font-medium text-sm">Ano *</label>
      <p-inputNumber
        [ngModel]="form().year"
        (ngModelChange)="updateForm('year', $event)"
        [min]="1900"
        [max]="3000"
        [showButtons]="true"
        [style]="{ width: '100%' }" />
    </div>

    <div class="field">
      <label class="block mb-1 font-medium text-sm">Temporada</label>
      <p-dropdown
        [options]="seasonOptions()"
        optionLabel="label"
        optionValue="value"
        [ngModel]="form().seasonId"
        (ngModelChange)="updateForm('seasonId', $event)"
        [style]="{ width: '100%' }" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="visibleChange.emit(false)" />
    <p-button label="Salvar título" icon="pi pi-check" [loading]="saving()" (onClick)="submit()" />
  </ng-template>
</p-dialog>
