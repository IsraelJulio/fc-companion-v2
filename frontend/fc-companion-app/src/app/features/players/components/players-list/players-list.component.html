<p-toast />

<div class="players-page">

  <!-- Filters bar -->
  <div class="filters-bar p-4 flex gap-3 align-items-center flex-wrap">
    <input
      pInputText
      type="text"
      placeholder="Buscar jogador..."
      style="min-width: 200px; flex: 1"
      [ngModel]="filters().search"
      (ngModelChange)="updateSearch($event)" />

    <p-dropdown
      [options]="positionOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Posição"
      [showClear]="false"
      [ngModel]="filters().position"
      (ngModelChange)="updatePosition($event)"
      [style]="{ width: '150px' }" />

    <p-dropdown
      [options]="leagueOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Liga"
      [showClear]="false"
      [ngModel]="filters().league"
      (ngModelChange)="updateLeague($event)"
      [style]="{ width: '180px' }" />

    <p-button
      label="Novo Jogador"
      icon="pi pi-plus"
      (onClick)="openCreateDialog()" />
  </div>

  <!-- Players table -->
  <p-table
    [value]="players()"
    [rows]="pageSize"
    [totalRecords]="total()"
    [lazy]="true"
    [loading]="loading()"
    [paginator]="true"
    [rowsPerPageOptions]="[20, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="{first}–{last} de {totalRecords} jogadores"
    (onLazyLoad)="onPageChange($event)"
    styleClass="p-datatable-gridlines"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 60px"></th>
        <th>Jogador</th>
        <th style="width: 90px">Posição</th>
        <th style="width: 90px">Overall</th>
        <th>Clube</th>
        <th>Liga</th>
        <th style="width: 110px">Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-player>
      <tr>
        <td>
          @if (player.photoUrl) {
            <p-avatar [image]="player.photoUrl" shape="circle" size="normal" />
          } @else {
            <p-avatar icon="pi pi-user" shape="circle" size="normal" />
          }
        </td>
        <td class="font-medium">{{ player.fullName }}</td>
        <td>
          <p-tag [value]="player.position" severity="secondary" />
        </td>
        <td>
          <p-tag
            [value]="player.overall.toString()"
            [severity]="overallSeverity(player.overall)"
            [rounded]="true" />
        </td>
        <td>{{ player.currentClub?.name ?? '—' }}</td>
        <td>{{ player.currentClub?.league ?? '—' }}</td>
        <td>
          <p-button
            icon="pi pi-eye"
            severity="secondary"
            [text]="true"
            [rounded]="true"
            pTooltip="Ver perfil"
            (onClick)="viewPlayer(player)" />
          <p-button
            icon="pi pi-pencil"
            severity="secondary"
            [text]="true"
            [rounded]="true"
            pTooltip="Editar stats"
            (onClick)="openEditDialog(player)" />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center p-4 text-color-secondary">
          Nenhum jogador encontrado.
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>

<!-- Edit stats dialog -->
<p-dialog
  [header]="'Stats — ' + selectedPlayerName()"
  [visible]="showStatsDialog()"
  (visibleChange)="!$event && closeDialog()"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [style]="{ width: '400px' }"
>
  @if (loadingDetail()) {
    <div class="flex justify-content-center p-4">
      <p-progressSpinner strokeWidth="4" [style]="{ width: '40px', height: '40px' }" />
    </div>
  } @else {
    <div class="flex flex-column gap-3 pt-2">

      <div class="field">
        <label class="block mb-1 font-medium text-sm">Gols</label>
        <p-inputNumber
          [ngModel]="editingStats().goals"
          (ngModelChange)="updateStat('goals', $event)"
          [min]="0" [showButtons]="true" [style]="{ width: '100%' }" />
      </div>

      <div class="field">
        <label class="block mb-1 font-medium text-sm">Assistências</label>
        <p-inputNumber
          [ngModel]="editingStats().assists"
          (ngModelChange)="updateStat('assists', $event)"
          [min]="0" [showButtons]="true" [style]="{ width: '100%' }" />
      </div>

      <div class="field">
        <label class="block mb-1 font-medium text-sm">Jogos</label>
        <p-inputNumber
          [ngModel]="editingStats().appearances"
          (ngModelChange)="updateStat('appearances', $event)"
          [min]="0" [showButtons]="true" [style]="{ width: '100%' }" />
      </div>

      <div class="field">
        <label class="block mb-1 font-medium text-sm">Minutos jogados</label>
        <p-inputNumber
          [ngModel]="editingStats().minutesPlayed"
          (ngModelChange)="updateStat('minutesPlayed', $event)"
          [min]="0" [showButtons]="true" [style]="{ width: '100%' }" />
      </div>

    </div>
  }

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="closeDialog()" />
    <p-button
      label="Salvar"
      icon="pi pi-check"
      [loading]="savingStats()"
      [disabled]="loadingDetail() || !editingSeasonId()"
      (onClick)="submitStats()" />
  </ng-template>
</p-dialog>

<!-- Create player dialog -->
<p-dialog
  header="Novo Jogador"
  [visible]="showCreateDialog()"
  (visibleChange)="!$event && closeCreateDialog()"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '440px' }"
>
  <div class="flex flex-column gap-3 pt-2">

    <div class="grid">
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Nome *</label>
          <input pInputText
            [ngModel]="createForm().firstName"
            (ngModelChange)="updateCreate('firstName', $event)"
            placeholder="Primeiro nome"
            class="w-full" />
        </div>
      </div>
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Sobrenome *</label>
          <input pInputText
            [ngModel]="createForm().lastName"
            (ngModelChange)="updateCreate('lastName', $event)"
            placeholder="Sobrenome"
            class="w-full" />
        </div>
      </div>
    </div>

    <div class="field">
      <label class="block mb-1 font-medium text-sm">Clube *</label>
      <p-dropdown
        [options]="clubOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Selecionar clube"
        [filter]="true"
        filterBy="label"
        [ngModel]="createForm().currentClubId"
        (ngModelChange)="updateCreate('currentClubId', $event)"
        [style]="{ width: '100%' }" />
    </div>

    <div class="grid">
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Posição</label>
          <p-dropdown
            [options]="positionOptions.slice(1)"
            optionLabel="label"
            optionValue="value"
            [ngModel]="createForm().position"
            (ngModelChange)="updateCreate('position', $event)"
            [style]="{ width: '100%' }" />
        </div>
      </div>
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Overall</label>
          <p-inputNumber
            [ngModel]="createForm().overall"
            (ngModelChange)="updateCreate('overall', $event)"
            [min]="1" [max]="99" [showButtons]="true"
            [style]="{ width: '100%' }" />
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Nacionalidade</label>
          <input pInputText
            [ngModel]="createForm().nationality"
            (ngModelChange)="updateCreate('nationality', $event)"
            placeholder="Opcional"
            class="w-full" />
        </div>
      </div>
      <div class="col-6">
        <div class="field">
          <label class="block mb-1 font-medium text-sm">Pé</label>
          <p-dropdown
            [options]="footOptions"
            optionLabel="label"
            optionValue="value"
            [ngModel]="createForm().preferredFoot"
            (ngModelChange)="updateCreate('preferredFoot', $event)"
            [style]="{ width: '100%' }" />
        </div>
      </div>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="closeCreateDialog()" />
    <p-button
      label="Criar"
      icon="pi pi-check"
      [loading]="savingCreate()"
      (onClick)="submitCreate()" />
  </ng-template>
</p-dialog>
